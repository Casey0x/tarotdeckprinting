<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Netlify form detection</title>
  </head>
  <body>
    <!-- Static form for Netlify build-time detection (Next.js) -->
    <form name="quote-request" netlify netlify-honeypot="bot-field">
      <input type="hidden" name="form-name" value="quote-request" />
      <input type="text" name="name" />
      <input type="email" name="email" />
      <select name="number-of-decks"></select>
      <input type="number" name="cards-per-deck" />
      <textarea name="message"></textarea>
    </form>
  </body>
</html>
